name: バグ報告 (Bug)
description: 不具合の報告と修正依頼。AI が単独で修正・完結できる粒度まで記述する。
title: "fix(scope): "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        再現手順・期待値・実際の挙動を具体的に。
        **追加質問なしで着手できる粒度** で記述すること（instructions/github-workflow.md）。

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が壊れているか。1〜2行で。
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: 再現手順
      description: 最小の再現ステップ。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する挙動
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の挙動
      description: エラーログ・スタックトレースがあれば原文のまま貼る。
    validations:
      required: true

  - type: textarea
    id: target
    attributes:
      label: 原因箇所 / 対象ファイル（推定可）
      description: 触るファイル・モジュールを具体名で。未特定なら調査範囲を書く。
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 受け入れ条件（テスト / 検証方法）
      description: 修正完了の判定基準。回帰テストを含める。
      placeholder: |
        - [ ] 再現手順でバグが出ないこと
        - [ ] 回帰テスト追加
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 補足 / 参考
      description: 環境・バージョン・関連 Issue（任意）。
    validations:
      required: false
