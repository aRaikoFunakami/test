name: ドキュメント (Docs)
description: ドキュメントの追加・修正。
title: "docs(scope): "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        どのドキュメントを・なぜ・どう変えるかを明記する。

  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: なぜ更新が必要か。現状の記述の問題・不足。
    validations:
      required: true

  - type: textarea
    id: target
    attributes:
      label: 対象ファイル
      description: 更新するドキュメントを具体名で列挙。
      placeholder: |
        - README.md
        - instructions/github-workflow.md
    validations:
      required: true

  - type: textarea
    id: changes
    attributes:
      label: 変更内容
      description: 追加・修正・削除する記述の方針。
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 受け入れ条件
      description: 完了判定。リンク切れ無し・表記統一など。
      placeholder: |
        - [ ] 記述が最新の挙動と一致
        - [ ] リンク切れなし
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 補足 / 参考
    validations:
      required: false
